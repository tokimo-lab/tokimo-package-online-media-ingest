name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  TOKIMO_LIB_VERSION: v1.1.10

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            lib_path: LD_LIBRARY_PATH
            asset: tokimo-lib-linux-x86_64.tar.zst
          - os: macos-latest
            lib_path: DYLD_FALLBACK_LIBRARY_PATH
            asset: tokimo-lib-macos-aarch64.tar.zst
          - os: windows-latest
            lib_path: PATH
            asset: tokimo-lib-windows-x86_64.tar.zst
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install zstd (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y --no-install-recommends zstd

      - name: Install zstd (macOS)
        if: runner.os == 'macOS'
        run: brew install zstd

      - name: Install zstd (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command zstd -ErrorAction SilentlyContinue)) {
            choco install zstandard -y --no-progress
          }

      - name: Cache tokimo-lib
        id: tokimo_lib_cache
        uses: actions/cache@v4
        with:
          path: tokimo-lib
          key: tokimo-lib-${{ matrix.asset }}-${{ env.TOKIMO_LIB_VERSION }}

      - name: Download native bundle
        if: steps.tokimo_lib_cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download "${TOKIMO_LIB_VERSION}" \
            --repo tokimo-lab/tokimo-lib \
            --pattern "${{ matrix.asset }}" \
            --dir .
          mkdir -p tokimo-lib
          zstd -dc "${{ matrix.asset }}" | tar -xf - -C tokimo-lib
          rm -f "${{ matrix.asset }}"

      - name: Set library paths
        shell: bash
        run: |
          LIB_DIR="$(pwd)/tokimo-lib/lib"
          PKG_DIR="${LIB_DIR}/pkgconfig"
          INC_DIR="$(pwd)/tokimo-lib/include"
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$LIB_DIR" >> "$GITHUB_PATH"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "DYLD_FALLBACK_LIBRARY_PATH=${LIB_DIR}" >> "$GITHUB_ENV"
          else
            echo "LD_LIBRARY_PATH=${LIB_DIR}" >> "$GITHUB_ENV"
          fi
          {
            echo "PKG_CONFIG_PATH=${PKG_DIR}"
            echo "FFMPEG_PKG_CONFIG_PATH=${PKG_DIR}"
            echo "FFMPEG_INCLUDE_DIR=${INC_DIR}"
            echo "FFMPEG_LIBS_DIR=${LIB_DIR}"
            echo "FFMPEG_LINK_MODE=dynamic"
          } >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
      - name: Clippy
        if: runner.os == 'Linux'
        run: |
          rustup component add clippy
          cargo clippy --workspace --lib --bins --tests -- -D warnings
